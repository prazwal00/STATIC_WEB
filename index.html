  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAFA;
      --text: #1A1A1A;
      --accent: #E63946;
      --secondary: #6B6B6B;
    }

    [data-theme="dark"] {
      --bg: #0A0A0A;
      --text: #FAFAFA;
      --secondary: #A0A0A0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: transparent;
      border: 1px solid var(--text);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      background-color: var(--text);
      color: var(--bg);
    }

    .curiosity-btn {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      background: transparent;
      border: 1px solid var(--secondary);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      color: var(--secondary);
      max-width: 180px;
      transition: all 0.3s ease;
    }

    .curiosity-btn.clicked {
      border-color: var(--accent);
      color: var(--accent);
      max-width: 300px;
    }

    .curiosity-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    [data-theme="dark"] .curiosity-btn {
      border-color: #555;
      color: #888;
    }

    [data-theme="dark"] .curiosity-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .container {
      text-align: center;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .name {
      font-family: 'Inter', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 2px 20px rgba(26, 26, 26, 0.08);
      animation: float 4s ease-in-out infinite;
      cursor: default;
      transition: text-shadow 0.3s ease, color 0.3s ease;
    }

    .name:hover {
      text-shadow: 0 2px 30px rgba(0, 0, 0, 0.3);
    }

    [data-theme="dark"] .name:hover {
      text-shadow: 0 2px 30px rgba(255, 255, 255, 0.2);
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--secondary);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      position: relative;
      display: inline-block;
      transition: opacity 0.5s ease;
    }

    .tagline::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: var(--text);
      transition: width 0.3s ease;
    }

    .tagline:hover::after {
      width: 100%;
    }

    .social-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 3rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: transparent;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .social-link:hover {
      transform: scale(1.15);
      background-color: rgba(230, 57, 70, 0.1);
    }

    .social-link svg {
      width: 24px;
      height: 24px;
      fill: var(--text);
      transition: fill 0.3s ease;
    }

    .social-link.linkedin:hover {
      background-color: rgba(0, 119, 181, 0.1);
    }

    .social-link.linkedin:hover svg {
      fill: #0077B5;
    }

    .social-link.twitter:hover {
      background-color: rgba(128, 128, 128, 0.2);
    }

    .social-link.twitter:hover svg {
      fill: var(--text);
    }

    @media (min-width: 600px) {
      .name {
        font-size: 3.5rem;
      }
    }

    @media (max-width: 480px) {
      .theme-toggle {
        top: 1rem;
        right: 1rem;
        padding: 0.4rem 0.8rem;
        font-size: 0.65rem;
      }

      .curiosity-btn {
        bottom: 1rem;
        left: 1rem;
        font-size: 0.6rem;
        padding: 0.4rem 0.6rem;
        max-width: 140px;
      }

      .tagline {
        letter-spacing: 0.15em;
        font-size: 1rem;
      }

      .social-links {
        gap: 1.5rem;
      }

      .social-link {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="mode-text">Dark</span>
  </button>
  <button class="curiosity-btn" onclick="handleCuriosity()">Do not click this button</button>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateButtonText();
    }
    function updateButtonText() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.querySelector('.mode-text').textContent = isDark ? 'Light' : 'Dark';
    }
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    }
    updateButtonText();
  </script>
  <script>
    function handleCuriosity() {
      const btn = document.querySelector('.curiosity-btn');
      const isClicked = btn.classList.toggle('clicked');
      
      if (isClicked) {
        btn.textContent = "That button explicitly said not to click. Interesting decision. Curiosity level: Acceptable.";
      } else {
        btn.textContent = "Do not click this button";
      }
    }
  </script>
  <div class="container">
    <h1 class="name">Prazwal Baral</h1>
    <p class="tagline">Troubleshooter</p>
    <script>
      const taglines = [
        "Troubleshooter",
        "Full Stack Vibe Coder",
        "ICT Specialist",
        "BSc(1st Hons) Networking and IT Security",
        "MBA Graduate",
        "WLV Exchange Fellowship 2024"
      ];
      const taglineEl = document.querySelector('.tagline');
      let index = 0;

      setInterval(() => {
        taglineEl.style.opacity = 0;
        setTimeout(() => {
          index = (index + 1) % taglines.length;
          taglineEl.textContent = taglines[index];
          taglineEl.style.opacity = 1;
        }, 500);
      }, 3000);
    </script>
    <div class="social-links">
      <a href="https://x.com/prazwal00" target="_blank" rel="noopener noreferrer" class="social-link twitter" aria-label="Twitter">

        </svg>

          <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
        </svg>
      </a>
    </div>
  </div>
</body>
</html>
