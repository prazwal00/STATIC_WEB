<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prazwal Baral | Troubleshooter</title>
  <meta name="description" content="Simplifying complex technical challenges through systematic troubleshooting and efficient solutions.">
  <style>
    :root {
      --primary: #1a1a1a;
      --secondary: #4a4a4a;
      --accent: #0077ff;
      --bg: #fafafa;
      --text: #333333;
      --grid-line: rgba(0, 119, 255, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.5s, color 0.5s;
    }

    .background {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      z-index: -2;
    }

    .grid-lines {
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
                        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 40s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    .dynamic-line {
      position: fixed;
      height: 1px;
      background: var(--accent);
      transform-origin: left center;
      animation: lineFlow 20s linear infinite;
      pointer-events: none;
      opacity: 0.2;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
    }

    header {
      text-align: center;
      margin: 6rem 0 4rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 1rem;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      font-size: 1.25rem;
      color: var(--secondary);
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    .tagline::after {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem auto;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin: 3rem 0;
    }

    .link-item {
      font-size: 1.1rem;
      padding: 0.75rem 1.5rem;
      border: 2px solid var(--primary);
      border-radius: 50px;
      text-decoration: none;
      color: var(--primary);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .link-item svg {
      width: 20px;
      height: 20px;
    }

    /* LinkedIn hover color */
    .link-item.linkedin:hover {
      color: white;
      background: #0077b5;
      border-color: #0077b5;
      transform: translateY(-2px);
    }

    /* Instagram hover color */
    .link-item.instagram:hover {
      color: white;
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      border-color: #cc2366;
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      margin: 4rem 0;
      color: var(--secondary);
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    @keyframes lineFlow {
      0% { transform: scaleX(0) translateX(-50vw); }
      100% { transform: scaleX(1) translateX(100vw); }
    }

    .click-effect {
      position: absolute;
      background: rgba(0, 119, 255, 0.1);
      border-radius: 50%;
      transform: scale(0);
      animation: clickRipple 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes clickRipple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .dark-mode {
      --bg: #0a0a0a;
      --text: #ffffff;
      --primary: #f0f0f0;
      --secondary: #cccccc;
      --grid-line: rgba(255, 255, 255, 0.05);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 2px solid var(--primary);
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s ease;
      z-index: 1000;
    }

    .theme-toggle:hover {
      transform: rotate(180deg);
      border-color: var(--accent);
    }

    .theme-toggle svg {
      width: 24px;
      height: 24px;
      fill: var(--primary);
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      .grid-lines, .dynamic-line {
        animation: none;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }
      .container {
        padding: 1.5rem;
      }
      .links {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="grid-lines"></div>
  
  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg id="theme-icon" viewBox="0 0 24 24"></svg>
  </button>

  <div class="container">
    <header>
      <h1>Prazwal Baral</h1>
      <p class="tagline">Troubleshooter</p>
    </header>

    <div class="links">
      <a href="https://www.linkedin.com/in/prazwal00" class="link-item linkedin" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.5 8h4V24h-4zM9 8h3.7v2.2h.1c.5-.9 1.8-2.2 3.9-2.2 4.2 0 5 2.8 5 6.5V24h-4v-7.9c0-1.9 0-4.3-2.6-4.3s-3 2-3 4.1V24H9z"/></svg>
        LinkedIn
      </a>
      <a href="https://www.instagram.com/prazwal00" class="link-item instagram" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4zm4.5 3a5.5 5.5 0 1 1 0 11a5.5 5.5 0 0 1 0-11zm0 2a3.5 3.5 0 1 0 0 7a3.5 3.5 0 0 0 0-7zm5.75-.75a1 1 0 1 1 0 2a1 1 0 0 1 0-2z"/></svg>
        Instagram
      </a>
    </div>

    <footer>
      <p>© <span id="year"></span> Prazwal Baral. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // Auto update copyright year
    document.getElementById("year").textContent = new Date().getFullYear();

    // Theme toggle logic
    function toggleTheme() {
      const body = document.body;
      const icon = document.getElementById("theme-icon");
      const isDark = body.classList.toggle("dark-mode");
      localStorage.setItem("theme", isDark ? "dark" : "light");

      // Switch icon
      icon.innerHTML = isDark
        ? '<path d="M12 4.5a7.5 7.5 0 100 15 7.5 7.5 0 000-15zM12 2v2m0 16v2m10-10h-2M4 12H2m16.95 7.05l-1.41-1.41M6.46 6.46L5.05 5.05m0 13.9l1.41-1.41M17.54 6.46l1.41-1.41"/>'
        : '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>';
    }

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");
    const icon = document.getElementById("theme-icon");
    if (savedTheme === "dark") {
      document.body.classList.add("dark-mode");
      icon.innerHTML =
        '<path d="M12 4.5a7.5 7.5 0 100 15 7.5 7.5 0 000-15zM12 2v2m0 16v2m10-10h-2M4 12H2m16.95 7.05l-1.41-1.41M6.46 6.46L5.05 5.05m0 13.9l1.41-1.41M17.54 6.46l1.41-1.41"/>';
    } else {
      icon.innerHTML =
        '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>';
    }

    // Create dynamic lines
    for (let i = 0; i < 5; i++) {
      const line = document.createElement('div');
      line.className = 'dynamic-line';
      line.style.top = `${Math.random() * 100}vh`;
      line.style.width = `${30 + Math.random() * 70}%`;
      line.style.animationDelay = `${Math.random() * 20}s`;
      document.body.appendChild(line);
    }

    // Click effect
    document.addEventListener('click', (e) => {
      const effect = document.createElement('div');
      effect.className = 'click-effect';
      effect.style.left = `${e.clientX}px`;
      effect.style.top = `${e.clientY}px`;
      document.body.appendChild(effect);
      setTimeout(() => effect.remove(), 600);
    });
  </script>
</body>
</html>
